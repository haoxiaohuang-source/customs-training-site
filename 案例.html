<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>案例教學</title>

<style>
body {font-family: Arial; margin: 0; background:#f5f5f5;}
.header {background:#f97316; color:white; padding:30px;}
.container {max-width:1000px; margin:auto;}
.card {background:white; margin:20px; padding:20px; border-radius:10px;}
.back {color:white;}
</style>
</head>

<body>

<div class="header">
  <div class="container">
    <h1>📦 案例教學</h1>
    <p>一票貨從頭到尾怎麼跑</p>
    <a class="back" href="新手_ver1.html">← 回首頁</a>
  </div>
</div>

<div class="container">

  <div class="card">
    <h2>📌 案例背景</h2>
    <p>客戶從中國進口電子零件</p>
    <p>金額：USD 5,000</p>
  </div>

  <div class="card">
    <h2>🪜 流程</h2>
    <p>1️⃣ 客戶提供 Invoice / Packing List / B/L</p>
    <p>2️⃣ 查船期（確認何時到港）</p>
    <p>3️⃣ 辦理換單（D/O）</p>
    <p>4️⃣ 準備報關文件</p>
    <p>5️⃣ 海關申報</p>
    <p>6️⃣ 繳稅</p>
    <p>7️⃣ 放行送貨</p>
  </div>

  <div class="card">
    <h2>⚠️ 中間發生的問題（重點🔥）</h2>
    <ul>
      <li>Invoice 品名太模糊 → 被海關問</li>
      <li>產地未標示 → 要補資料</li>
    </ul>
  </div>

  <div class="card">
    <h2>🎯 學到什麼</h2>
    <ul>
      <li>文件一定要寫清楚</li>
      <li>產地不能漏</li>
      <li>報關前要先檢查</li>
    </ul>
  </div>

</div>

</body>
</html>
