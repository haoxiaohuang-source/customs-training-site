<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>Packing List 教學</title>

<style>
body {font-family: Arial; margin:0; background:#f5f5f5;}
.header {background:#7c3aed; color:white; padding:30px;}
.container {max-width:1000px; margin:auto;}
.card {background:white; margin:20px; padding:20px; border-radius:10px;}
.back {color:white;}
</style>
</head>

<body>

<div class="header">
  <div class="container">
    <h1>📦 Packing List 教學</h1>
    <p>裝箱單（新人第二重要文件🔥）</p>
    <a class="back" href="新手.html">← 回首頁</a>
  </div>
</div>

<div class="container">

  <div class="card">
    <h2>📌 什麼是 Packing List？</h2>
    <p>👉 裝箱單（貨怎麼裝）</p>
    <p>👉 記錄「數量、重量、包裝」</p>
  </div>

  <div class="card">
    <h2>🎯 用途</h2>
    <ul>
      <li>報關使用</li>
      <li>確認貨物數量</li>
      <li>核對實際貨物</li>
    </ul>
  </div>

  <div class="card">
    <h2>🔍 要看哪裡（重點🔥）</h2>
    <ul>
      <li>件數（Packages）</li>
      <li>淨重（Net Weight）</li>
      <li>毛重（Gross Weight）</li>
      <li>體積（CBM）</li>
    </ul>
  </div>

  <div class="card">
    <h2>⚠️ 常見錯誤</h2>
    <ul>
      <li>重量跟報關不一致</li>
      <li>件數錯誤</li>
      <li>Invoice 對不起來</li>
    </ul>
  </div>

  <div class="card">
    <h2>🧠 新人記住一句話</h2>
    <p>👉 Packing List = 「貨的數量與重量」</p>
  </div>

</div>

</body>
</html>
